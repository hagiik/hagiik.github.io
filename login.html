<!DOCTYPE html>
<html lang="en">

<head>
  <!-- Required meta tags -->
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" />
  <link rel="icon" href="img/icon.png" />
  <title>Shop</title>
</head>

<body class="bg-light">
  <section class="container shadow-lg" style="position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%);">
    <div class="row">
      <div class="col-7 d-none d-md-block" style="background-color: #ccd8ff">
        <div class="container py-4">
          <div>
            <img src="https://getbootstrap.com/docs/5.0/assets/brand/bootstrap-logo.svg" alt="" width="30" height="24"
              class="d-inline-block align-text-top" />
            <span class="brand">BrandShop</span>
          </div>
          <div class="text-center mt-5">
            <img src="img/model.png" alt="" class="img-fluid" width="250" />
          </div>
          <div class="position-fixed bottom-0 mb-4">
            <span><strong>FASHION!</strong> To make people good looking.</span>
          </div>
        </div>
      </div>
      <div class="col-md-5">
        <div class="container py-4">
          <h2>LOGIN</h2>
          <form>
            <div class="mb-3">
              <label for="inputEmail1" class="form-label">Email address</label>
              <input type="email" class="form-control" id="inputEmail1" aria-describedby="emailHelp">
            </div>
            <div class="mb-3">
              <label for="inputPassword1" class="form-label">Password</label>
              <input type="password" class="form-control" id="inputPassword1">
            </div>
            <button type="submit" class="btn btn-primary w-100">LOGIN</button>
          </form>
          <div class="text-center mt-3">
            <a href="#">Forgotten Password?</a>
          </div>
          <hr />
          <div class="text-center">
            <span>Don't have an account? Sign up now!</span>
            <a class="btn btn-success w-100 my-3" href="regist.html">SIGN UP</a>
            <a href="index.html">Back to home</a>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
    crossorigin="anonymous"></script>
  <script src="js/script.js"></script>
</body>

</html>
