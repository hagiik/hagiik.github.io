<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" />
    <link rel="icon" href="img/icon.png" />
    <title>Shop</title>
</head>

<body class="bg-light">
    <div id="logo"></div>
    <section class="container shadow-lg"
        style="position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%);">
        <div class="row">
            <div class="col-7 d-none d-md-block" style="background-color: #ccd8ff">
                <div class="container py-4">
                    <div>
                        <img src="https://getbootstrap.com/docs/5.0/assets/brand/bootstrap-logo.svg" alt="" width="30"
                            height="24" class="d-inline-block align-text-top" />
                        <span class="brand">BrandShop</span>
                    </div>
                    <div class="text-center mt-5">
                        <img src="img/model.png" alt="" class="img-fluid" width="250" />
                    </div>
                    <div class="position-fixed bottom-0 mb-4">
                        <span><strong>FASHION!</strong> To make people good looking.</span>
                    </div>
                </div>
            </div>
            <div class="col-md-5" id="form" style="height: 500px; overflow: auto;">
                <div class="container py-4">
                    <h2>SIGN UP</h2>
                    <form class="overflow-auto">
                        <div class="mb-3">
                            <label for="inputFullname1" class="form-label">Full Name</label>
                            <input type="text" class="form-control" id="inputFullname1" placeholder="Enter full name">
                        </div required>
                        <div class="mb-3">
                            <label for="inputEmail1" class="form-label">Email address</label>
                            <input type="email" class="form-control" id="inputEmail1" aria-describedby="emailHelp"
                                placeholder="Enter email address" required>
                        </div>
                        <div class="mb-3">
                            <label for="inputAddress" class="form-label">Address</label>
                            <textarea class="form-control" id="inputAddress" rows="3"
                                placeholder="Enter full address for shipping"></textarea>
                        </div>
                        <div class="mb-3">
                            <label for="inputZipCode" class="form-label">Zip Code</label>
                            <input type="text" class="form-control" id="inputZipCode" placeholder="Enter Zip Code">
                        </div required>
                        <div class="mb-3">
                            <label for="inputPhoneNumber" class="form-label">Phone Number</label>
                            <input type="text" class="form-control" id="inputPhoneNumber" placeholder="Phone Number"
                                required>
                        </div>
                        <div class="mb-3">
                            <label for="inputPassword1" class="form-label">Password</label>
                            <input type="password" class="form-control" id="inputPassword1"
                                placeholder="Enter new password" required>
                        </div>
                        <div class="mb-3">
                            <label for="inputRetypePassword1" class="form-label">Retype Password</label>
                            <input type="password" class="form-control" id="inputRetypePassword1"
                                placeholder="Retype Password" required>
                        </div>
                        <a type="submit" href="index.html" class="btn btn-primary w-100">SIGN UP</a>
                    </form>
                    <div class="text-center mt-3">
                        <a href="#">Forgotten Password?</a>
                    </div>
                    <hr />
                    <div class="text-center">
                        <span>Have an account? Login now!</span>
                        <a class="btn btn-success w-100 my-3" href="login.html">LOGIN</a>
                        <a href="index.html">Back to home</a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div id="logo" class="position-fixed bottom-0 d-block d-md-none mb-5"
        style="transform: translate(-50%); left: 50%; font-size: 12px;">
        © 2021 Copyright: <a class="text-reset fw-bold" href="#!">Your Store</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
    <script src="js/script.js"></script>
</body>

</html>
